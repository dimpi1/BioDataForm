<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioData Form</title>
</head>
<body>
    <form action="#" method="get">
    <h1>My Bio data</h1>

    <fieldset>
        <legend>Personal Information</legend>
        <label for="firstname">First Name: </label>
        <input type="text" name="firstname" id="firstname" placeholder="First Name" required>
        <label for="lastname">Last Name: </label>
        <input type="text" name="lastname" id="lastname" placeholder="Last Name" required>
        <br>
        <br>
        <label for="gender">Gender: </label>
        <label for="male">Male</label>
        <input type="radio" name="gender" value="male">
        <label for="female">Female</label>
        <input type="radio" name="gender" value="female">
        <label for="others">Others</label>
        <input type="radio" name="gender" value="others">
        <br>
        <br>
        <label for="dateOfBirth">Date Of Birth: </label>
        <input type="date" name="dateOfBirth" id="dateOfBirth">
        <br>
        <br>
        <label for="email">Enter your Email Id: </label>
        <input type="email" name="email" id="email" placeholder="abc@gmail.com" required>
        <br>
        <br>
        <label for="phoneno">Phone No: </label>
        <input type="number" name="phoneno" id="phoneno" placeholder="+91" required>
        <br>
        <br>
        <label for="height">Height: </label>
        <input type="number" name="height" id="height" placeholder="Enter in Feet">
    </fieldset>
    <br><br>
    <fieldset>
        <legend>Education Information</legend>
        <label for="schoolName">School Name:</label>
        <input type="text" name="schoolName" id="schoolName" placeholder="School Name">
        <br>
        <br>
        <label for="class">Class: </label>
        <input type="number" name="class" id="class" max="12" placeholder="Enter Class">
        <br>
        <br>
        <label for="stream">Stream:</label>
        <select name="stream" id="stream">
            <option value="medical">Medical</option>
            <option value="non medical">Non Medical</option>
            <option value="commerce">Commerce</option>
            <option value="arts">Arts</option>
        </select>
        <br>
        <br>
        <label for="marksheet">Marksheet:</label>
        <input type="file" name="marksheet" id="marksheet">
    </fieldset>
    <br>
    <button type="submit">Submit</button>
</form>
</body>
</html>
